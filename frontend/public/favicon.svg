  <!-- 🎯 MAX SIZE TEXT -->
  <g transform="translate(32,32)">
    <text
      text-anchor="middle"
      dy="0.38em"
      font-size="36"   
      font-family="Inter, Arial, sans-serif"
      font-weight="700"
      fill="url(#g)"
